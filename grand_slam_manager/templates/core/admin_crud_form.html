{% extends "base.html" %}
{% block page_heading %}{{ title }}{% endblock %}
{% block content %}
  <section class="panel-card narrow-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <p class="eyebrow mb-1">CRUD administrador</p>
        <h2 class="section-title mb-0">{{ title }}</h2>
      </div>
      <a class="btn btn-outline-secondary" href="{{ back_url }}">Volver</a>
    </div>
    <form method="post" novalidate>
      {% csrf_token %}
      {% include "shared/form_fields.html" with form=form %}
      <button class="btn btn-court" type="submit">Guardar</button>
    </form>
  </section>
{% endblock %}
