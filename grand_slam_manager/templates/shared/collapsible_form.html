<details class="form-disclosure compact-card" data-disclosure-key="{{ title|slugify }}" {% if form.errors or force_open %}open{% endif %}>
  <summary>
    <span>
      <small>{{ eyebrow|default:"Formulario" }}</small>
      <strong>{{ title }}</strong>
    </span>
    <b>Abrir</b>
  </summary>
  <form method="post" action="{{ action }}" novalidate>
    {% csrf_token %}
        {% include "shared/form_fields.html" with form=form %}
    <button class="btn btn-court w-100" type="submit">{{ submit_label|default:"Guardar" }}</button>
  </form>
</details>
<script>
  (() => {
    document.querySelectorAll("[data-disclosure-key]").forEach((details) => {
      if (details.dataset.disclosureReady === "true") return;
      details.dataset.disclosureReady = "true";
      const key = `grand-slam-form-open:${location.pathname}:${details.dataset.disclosureKey}`;
      const stored = sessionStorage.getItem(key);
      if (stored === "1") details.open = true;
      details.addEventListener("toggle", () => sessionStorage.setItem(key, details.open ? "1" : "0"));
    });
  })();
</script>
